<!DOCTYPE html>
<html>
<head>
    <title>SafeNepalApp QR Code</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            text-align: center; 
            padding: 40px; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        .container { 
            background: white; 
            padding: 40px; 
            border-radius: 15px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            max-width: 500px;
        }
        #qrcode { 
            margin: 30px auto; 
            padding: 20px;
            background: #f9f9f9;
            border-radius: 10px;
            display: inline-block;
            min-height: 300px;
            min-width: 300px;
        }
        .url { 
            font-family: 'Courier New', monospace; 
            background: #f0f0f0; 
            padding: 15px; 
            border-radius: 8px; 
            margin: 20px 0; 
            word-break: break-all;
            font-size: 16px;
            border: 2px solid #e0e0e0;
            font-weight: bold;
        }
        h1 { 
            color: #333; 
            margin-bottom: 10px;
        }
        .instructions {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            text-align: left;
        }
        .instructions h3 {
            color: #333;
            margin-bottom: 10px;
        }
        .instructions ol {
            color: #666;
            line-height: 1.8;
        }
        .loading {
            color: #666;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔗 SafeNepalApp</h1>
        <p>Scan this QR code with Expo Go:</p>
        <div id="qrcode">
            <p class="loading">Loading QR code...</p>
        </div>
        <div class="url" id="urlDisplay">exp://192.168.112.1:8081</div>
        <p><strong>Or enter the URL above manually</strong></p>
        
        <div class="instructions">
            <h3>📱 How to Connect:</h3>
            <ol>
                <li>Open <strong>Expo Go</strong> app on your phone</li>
                <li>Tap <strong>"Scan QR Code"</strong></li>
                <li>Point camera at the QR code above</li>
                <li>Or manually enter: <code>exp://192.168.112.1:8081</code></li>
            </ol>
        </div>
    </div>
    <script>
        const expoUrl = 'exp://192.168.112.1:8081';
        const qrDiv = document.getElementById('qrcode');
        
        // Wait for QRCode library to load
        function generateQRCode() {
            if (typeof QRCode === 'undefined') {
                console.error('QRCode library not loaded');
                qrDiv.innerHTML = '<p style="color:red;">QR Code library failed to load. Please use the URL manually: <br><strong>' + expoUrl + '</strong></p>';
                return;
            }
            
            // Clear loading message
            qrDiv.innerHTML = '';
            
            // Create canvas element
            const canvas = document.createElement('canvas');
            qrDiv.appendChild(canvas);
            
            // Generate QR Code
            QRCode.toCanvas(canvas, expoUrl, {
                width: 300,
                margin: 2,
                color: {
                    dark: '#000000',
                    light: '#FFFFFF'
                }
            }, function (error) {
                if (error) {
                    console.error('QR Code generation error:', error);
                    qrDiv.innerHTML = '<p style="color:red;">Error generating QR code. Use the URL manually:<br><strong>' + expoUrl + '</strong></p>';
                } else {
                    console.log('QR Code generated successfully');
                }
            });
        }
        
        // Try to generate immediately
        if (typeof QRCode !== 'undefined') {
            generateQRCode();
        } else {
            // Wait for library to load
            window.addEventListener('load', function() {
                setTimeout(generateQRCode, 500);
            });
            
            // Also try after a short delay
            setTimeout(function() {
                if (qrDiv.innerHTML.includes('Loading')) {
                    generateQRCode();
                }
            }, 1000);
        }
    </script>
</body>
</html>
