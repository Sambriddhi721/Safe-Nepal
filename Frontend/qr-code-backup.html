<!DOCTYPE html>
<html>
<head>
    <title>SafeNepalApp QR Code - Backup</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            text-align: center; 
            padding: 40px; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        .container { 
            background: white; 
            padding: 40px; 
            border-radius: 15px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            max-width: 500px;
        }
        .qrcode-img { 
            margin: 30px auto; 
            padding: 20px;
            background: #f9f9f9;
            border-radius: 10px;
            display: inline-block;
        }
        .url { 
            font-family: 'Courier New', monospace; 
            background: #f0f0f0; 
            padding: 15px; 
            border-radius: 8px; 
            margin: 20px 0; 
            word-break: break-all;
            font-size: 16px;
            border: 2px solid #e0e0e0;
            font-weight: bold;
        }
        h1 { 
            color: #333; 
            margin-bottom: 10px;
        }
        .instructions {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            text-align: left;
        }
        .instructions h3 {
            color: #333;
            margin-bottom: 10px;
        }
        .instructions ol {
            color: #666;
            line-height: 1.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔗 SafeNepalApp</h1>
        <p>Scan this QR code with Expo Go:</p>
        <div class="qrcode-img">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=exp://192.168.112.1:8081" alt="QR Code" />
        </div>
        <div class="url">exp://192.168.112.1:8081</div>
        <p><strong>Or enter the URL above manually</strong></p>
        
        <div class="instructions">
            <h3>📱 How to Connect:</h3>
            <ol>
                <li>Open <strong>Expo Go</strong> app on your phone</li>
                <li>Tap <strong>"Scan QR Code"</strong></li>
                <li>Point camera at the QR code above</li>
                <li>Or manually enter: <code>exp://192.168.112.1:8081</code></li>
            </ol>
        </div>
    </div>
</body>
</html>
