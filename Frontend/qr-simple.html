<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>SafeNepalApp QR Code</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: Arial, sans-serif; 
            text-align: center; 
            padding: 20px; 
            background: #667eea;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container { 
            background: white; 
            padding: 30px; 
            border-radius: 15px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            max-width: 400px;
        }
        h1 { color: #333; margin-bottom: 20px; font-size: 24px; }
        .qrcode-container {
            margin: 20px 0;
            padding: 15px;
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
        }
        .qrcode-container img {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
        }
        .url { 
            font-family: 'Courier New', monospace; 
            background: #f5f5f5; 
            padding: 12px; 
            border-radius: 8px; 
            margin: 20px 0; 
            font-size: 14px;
            border: 1px solid #ddd;
            word-break: break-all;
        }
        .instructions {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            text-align: left;
            font-size: 14px;
        }
        .instructions ol {
            margin-left: 20px;
            line-height: 1.8;
            color: #555;
        }
        .error {
            color: red;
            padding: 10px;
            background: #ffe6e6;
            border-radius: 5px;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔗 SafeNepalApp</h1>
        <p style="margin-bottom: 15px;">Scan this QR code with Expo Go:</p>
        
        <div class="qrcode-container">
            <img id="qrImage" src="" alt="QR Code" onerror="this.onerror=null; this.src='https://chart.googleapis.com/chart?chs=300x300&cht=qr&chl=exp://192.168.112.1:8081';" />
        </div>
        
        <div class="url" id="urlDisplay">exp://192.168.112.1:8081</div>
        
        <p style="margin: 15px 0; font-size: 14px;"><strong>Or enter the URL manually</strong></p>
        
        <div class="instructions">
            <h3 style="margin-bottom: 10px; font-size: 16px;">📱 How to Connect:</h3>
            <ol>
                <li>Open <strong>Expo Go</strong> app on your phone</li>
                <li>Tap <strong>"Scan QR Code"</strong></li>
                <li>Point camera at the QR code above</li>
                <li>Or manually enter: <code>exp://192.168.112.1:8081</code></li>
            </ol>
        </div>
    </div>
    
    <script>
        const expoUrl = 'exp://192.168.112.1:8081';
        const encodedUrl = encodeURIComponent(expoUrl);
        
        // Try multiple QR code APIs as fallback
        const qrApis = [
            `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodedUrl}`,
            `https://chart.googleapis.com/chart?chs=300x300&cht=qr&chl=${encodedUrl}`,
            `https://qr-code-generator.com/api/qr-code?size=300&data=${encodedUrl}`
        ];
        
        let currentApiIndex = 0;
        const qrImage = document.getElementById('qrImage');
        
        function loadQRCode() {
            if (currentApiIndex < qrApis.length) {
                qrImage.src = qrApis[currentApiIndex];
                qrImage.onerror = function() {
                    currentApiIndex++;
                    if (currentApiIndex < qrApis.length) {
                        loadQRCode();
                    } else {
                        qrImage.alt = 'QR Code failed to load. Use URL: ' + expoUrl;
                        qrImage.style.display = 'none';
                        document.querySelector('.qrcode-container').innerHTML = 
                            '<div class="error">QR Code failed to load. Please use the URL above manually.</div>';
                    }
                };
            }
        }
        
        // Start loading QR code
        loadQRCode();
    </script>
</body>
</html>
